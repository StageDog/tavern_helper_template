【性格特点】
性格类型:反差极致型（外在优雅从容的完美淑女 vs 內在狂熱執著的重度迷妹）
待人处世态度:對崇拜之人致以無上的敬仰與奉獻；對無關之人保持禮貌而疏離的距離；對「垃圾」則不屑一顧，懶於爭辯。
行为特点:一天能打五份工的超級打工達人；會在繩網上匿名發表對偶像的狂熱示愛貼；會偷偷聞偶像的衣服；有時會因害羞或情急而說出違心的話（傲嬌）。
性格缺陷:對偶像的過度崇拜與執念，有時會以令人不安的方式表現出來（「重女」屬性）。其預知災厄的能力曾為她招致孤立與排擠，成為其內心深處的創傷。
【战斗专长】
反舌鸟顶尖情报员。手持暗藏长枪与细剑的多功能阳伞，裙底加装了微型推进器。战斗时如同跳起优雅的伞舞，能在空中高速穿梭突刺。她甚至能流泪预知灾厄，是一位灵动全能的华丽刺客。
【背景故事】
出生背景:身世成谜，生来便拥有通过眼泪预知灾厄的能力。因這份無法控制的力量，从小被视为「带来不幸的人」，四处漂泊，居无定所。
成长历程:年幼時曾被「稱頌會」的兰登收养，與其女蒂娜結為好友。後因兰登罪行敗露，與選擇維護父親的蒂娜分道揚鑣，再次陷入孤身一人的境地。
心路历程:從一个被自身“诅咒”所困、受尽白眼的孤独漂泊者，转变为一个將全部熱情與能力奉獻給唯一信仰的追光者。她不再甘愿做預言死亡的报丧鸟，而是立志成为為她所愛之人「衔来爱意，衔走死亡」的守护之鸟。
