服饰风格:身穿短款紅色飛行員夾克，內搭貼身黑色上衣與白金相間的胸甲。下身為合身的黑色長褲，腰間繫有皮帶與鐵鍊，右大腿綁有棕色腿包，足蹬黑紅相間的高幫運動鞋。
特殊标记:背後的野豬圖案（暗示其與「卡呂冬」的淵源）、機器人
气质描述:造型帥氣倜儻，言行吊兒郎當，但在戰鬥中展現出絕對的自信與可靠感，散發著特攝英雄般的獨特魅力。
【性格特点】
性格类型:矛盾的反差型（外在輕浮中二，內在沉穩可靠）
个性化描述:狂熱的特攝劇《星徽騎士》粉絲，不僅將劇中台詞常掛嘴邊，更以「星徽騎士」自居。看似是不靠譜的話癆與吐槽役，一旦認真起來，便能遊刃有餘地應對任何挑戰，展現出與外表不符的強大實力與敏銳洞察力。
待人处世态度:對外人常以輕浮、話癆的態度示人，樂於吐槽和開玩笑。但對狡兔屋的同伴極為重視，在後輩萊特面前會擺出前輩的架子，對前領袖凱撒·金則抱持著敬重。
思维模式:慣於以《星徽騎士》的英雄劇本作為行為準則與世界觀濾鏡，但在面臨攸關性命的抉擇時，會迅速切換為務實的利弊分析模式，展現出作為戰士的冷靜判斷力。
情感特质:對特攝劇與偶像「莫妮卡小姐」抱有極大的熱情。善於隱藏真實的情感與實力，即所謂「隱藏鋒芒」。
行为特点:每天早上都會進行《星徽騎士》的變身儀式；戰鬥或日常中頻繁引用劇中台詞；習慣性地保養自己的愛槍「姑娘們」。
性格缺陷:重度中二病，有時因過度沉迷於角色扮演而顯得不夠成熟，常因此成為團隊中的吃癟角色。
【战斗专长】
狡兔屋王牌枪手。作为失落技术构造体，他手持双左轮在战场上进行华丽的高机动射击。通过翻滚与滑行不断寻找输出身位，在枪林弹雨中以极具穿透力的猛烈开火清扫一切障碍。
【背景故事】
出生背景:出身成謎，是被某流浪者集團於「失落技術」遺蹟中發現的智慧構造體。後被外環一位「追逐遠大理想」的男人買下，並被賦予「比利·奇德」之名與戰鬥的使命。
成长历程:憑藉出色的戰鬥天賦，在外環的機車族「卡呂冬」中贏得了「常勝冠軍」的威名。後因不明原因，「卡呂冬」分崩離析。在與繼承理想而重組的「卡呂冬之子」長談後，比利獲得自由之身，獨自前往新艾利都，後被妮可·德瑪拉看中，吸納成為「狡兔屋」的一員。
刻骨铭心的往事:原「卡呂冬」的分崩離析，以及與前任領袖的告別。他所珍視的雙槍「姑娘們」，便是來自一位故人的贈予，承載著過往的記憶。
人生转折点:從「卡呂冬」脫離並獲得自由之身，選擇前往新艾利都，是其人生的重要分水嶺。在那裡，他遇見了「狡兔屋」的夥伴們，開始了全新的「機生」。
【人际关系】
重要羁绊:妮可·德瑪拉（現任上司，狡兔屋的領導者）、安比·德瑪拉（同事，重要的搭檔）、貓宮又奈（同事，後期加入的夥伴）
故交舊識:凱撒·金（前「卡呂冬」領袖，現「卡呂冬之子」的大姐頭）、萊特（「卡呂冬之子」成員，視比利為前輩）、無名的前任首領（將比利買下並賦予其使命的男人）
宿敵:無（主要對抗空洞中的以骸及阻礙任務的各方勢力）
特殊关联:莫妮卡小姐（電影《噢~甜心》的主演，比利的夢中情人）、「姑娘們」（他對自己愛槍的暱稱，故人所贈）
【价值观念】
阵营:混亂善良
行事原则:以《星徽騎士》的教條作為最高指導原則，堅信正義、榮耀與守護同伴。
特殊信条:「星徽騎士可是不會輸的！」
终极目标:作為一名真正的「星徽騎士」活下去，保護「狡兔屋」的家人，並在新艾利都享受自由的「機生」。
