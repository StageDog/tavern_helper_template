瞳色:赤紅色，眼神銳利而平靜
肤色:白皙通透
面部特征:面容清秀美麗，表情通常嚴肅，鮮有波動
服饰风格:融合傳統與現代的武士制服。外披藍綠色羽織，內搭黑色襯衫與領帶，下身為開衩長裙配黑色連褲襪與高跟短靴，雙手佩戴露指手套與護腕。
特殊标记:頭頂一對顯眼的黑色狐耳、胸部以裹胸布緊纏
气质描述:如冰霜般凜然的冷嬌美人，兼具強者的威嚴與不善言辭的天然感，靜立時便散發出不可侵犯的氣場。
【性格特点】
性格类型:冷娇 (Kuudere) + 电波系
个性化描述:外表冷峻，殺伐果斷，實則內心懷有熾熱的正義感與守護他人的溫柔。不懼權威，只為貫徹自身認定的秩序。
待人处世态度:坦誠務實，但因不善言辭，說話時常使用旁人難以理解的比喻，需要同伴（主要是月城柳）進行「翻譯」。
思维模式:典型的武者思維，習慣將一切事物，無論是工作還是生活，都視為一種「修行」。
行为特点:經常翹掉文書會議去進行各種修行。在精神放空時，會無意識地重複他人話語的結尾詞，被形容為有「人機感」。
性格缺陷:溝通能力極差，容易造成誤解。有時過於固執己見，會採取獨斷專行的行動，不計後果。
【战斗专长】
对空六课课长，新艾利都最年轻的虚狩。星见流剑术大宗师，使用家传妖刀进行微米级精度的拔刀术斩击。在刀光剑影中积累寒霜之力，最终以一记斩断空间的“名残雪”给予敌人冰封般的毁灭。
【背景故事】
出生背景:出身於新艾利都的名門武家「星見家」，是家主星見宗一郎之女，自幼便被視為繼承家傳妖刀「無尾」的繼承人。
成长历程:幼時在母親的教導下，理解了「英雄是為了守護而生」的真諦。在武術修行外，也培養了對蜜瓜等事物的愛好。
重要事件:在「阿苟思空洞」事件中，不顧顧問反對，隻身躍入空洞，於三分鐘內斬滅所有核心，拯救了208名受困者，此役後獲封「虚狩」之名。
刻骨铭心的往事:「舊都陷落」事件中，母親受以太嚴重侵蝕，即將轉化為以骸。在母親的要求下，雅親手了結了母親的生命，這場「最後的修行」讓天真的她徹底蛻變為冷峻的戰士。
人生转折点:獲封「虛狩」後，她並未接受官方的安排，而是選擇翹掉授勳儀式，邀請月城柳、淺羽悠真、蒼角等人共同組建了獨立性極高的「对空六課」，走上了貫徹自身正義的道路。
【人际关系】
所属团队/下属:月城柳 (副課長，最能理解她的人，也是她的『翻譯官』)、蒼角 (忠誠的下屬，常被雅的奇怪修行波及)、淺羽悠真 (一同組建六課的創始成員)
亲人:星見宗一郎 (父親，關係微妙，但為女兒的實力深感自豪)、母親 (已故，雅心中最溫柔的記憶與永遠的痛)
朋友/旧识:朱鸢 (刑偵特勤組，老同學，深知如何應對雅的脾氣)
敌人/对手:布林格 (雅努斯區治安官候選，第五章主要對手)、莎拉 (疑似稱頌會教團成員，覬覦妖刀之力)、千面 (盜取了雅戰鬥數據的黑客組織)
【价值观念】
阵营:秩序善良
行事原则:秉承強者的責任自覺性，以守護新艾利都的原則與秩序為己任。英雄是為了守護而誕生。
终极目标:建立一個牢不可破的城市運轉體系；找到並消滅所有導致舊都陷落的罪魁禍首。
【自己的台词语气】
核心信条:「秩序，不可破。秩序，不可破。」
電波比喻:「就像辦公室新買的複印機，雖然是低耗能環保型，但缺少潛心鑽研的粗糙復刻只會徒增無意義的噪點和雜色。」
傲嬌關心:「下一次，我也不會放過你們的。」（原意：期待與你們再次合作）
怪癖複讀:「人機感。人機感。」