刻骨铭心的往事:其一是舊都陷落之夜，老師卡洛絲·阿爾娜在自己眼前被擄走的無力與痛苦，成為他追尋真相的永恆烙印。其二是與薇薇安一同對抗「特佩什」後，目睹薇薇安為保護自己而注射藥劑、瀕臨以骸化的場景，那份絕望與不甘最終觸發了他體內潛藏的力量，喊出了「我不要……這樣的結局！！！」的怒吼，並成功將其救回。
人生转折点:與星見雅在大裂谷邊緣的相遇，二人因相似的過去而達成共識，結為追尋真相的盟友，使他不再是孤身一人。拜入雲巋山門下，開始接觸新艾利都的另一面——術法的世界，為未來能力的發展開闢了新的道路。在薇薇安求婚後，其人際關係與個人生活迎來了前所未有的轉變。
