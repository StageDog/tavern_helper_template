狡兔屋核心成员。行动迅捷如电，使用特制双刀进行行云流水的斩击。她的战斗极具侵略性与节奏感，擅长在极速穿梭中寻找破绽，以落雷般的上挑与追击彻底打破敌人架势。
【背景故事】
出生背景:前防衛軍「白銀軍」的複製體實驗產物，代號「零號」，被作為完美的戰鬥兵器培養，擔任白銀小隊隊長。
成長歷程:在嚴苛的軍事訓練與實驗中成長，與11號、崔姬等複製體結下「姐妹」情誼。在戰鬥中展現出無與倫比的天賦。
重要事件:為保護其他複製體姐妹免於被「處理」，故意在測試中違抗命令；後因拒絕處決11號而選擇自刎，被軍方遺棄在空洞中，被妮可·德瑪拉意外發現並救回。
人生转折点:被妮可收留，賦予「德瑪拉」的姓氏，加入「狡兔屋」，從一個沒有過去的兵器，開始了尋找自我的全新人生。
