            <button type="button" id="fill-example-btn" class="secondary-btn">填充当前角色示例</button>
            <button type="submit" id="start-btn" class="primary-btn">接入终端并开始</button>
          </div>

          <div class="footer-note">
            点击主角卡会自动填入示例<br>

        <div class="bottom-nav">

  <script>
    $(function() {
      const storageKey = 'zzz_phone_opening_data_v5';

      function updateClock() {
        const now = new Date();
        const hh = String(now.getHours()).padStart(2, '0');
        const mm = String(now.getMinutes()).padStart(2, '0');
        $('#current-time').text(hh + ':' + mm);
      }

      function getSTDocument() {
        if (window.parent && window.parent.document) return window.parent.document;
        return document;
      }

      function getChatInput() {
        const doc = getSTDocument();
        return doc.querySelector('#send_textarea') || doc.querySelector('textarea');
      }

      function refreshModePanels() {
        const mode = $('.mode-btn.active').data('mode');
        if (mode === '剧情模式') {
          $('#story-mode-panel').removeClass('hidden');
          $('#sanctum-mode-panel').addClass('hidden');
        } else {
          $('#story-mode-panel').addClass('hidden');
          $('#sanctum-mode-panel').removeClass('hidden');
        }
      }

      function applyReadonlyByRole(protagonist) {
        const $name = $('#character-name');

        if (protagonist === '哲' || protagonist === '铃') {
          $name.prop('readonly', true);
        } else {
          $name.prop('readonly', false);
        }
      }

      function getExampleData(protagonist) {
        if (protagonist === '哲') {
          return {
            protagonist: '哲',
            mode: '剧情模式',
            chapter: '生意×怪事×正义',
            storyStartPoint: '委托开始前的日常时段',
            storyLocation: '录像店二楼',
            storyExtra: '希望从哲的冷静视角切入，先有城市日常氛围，再自然进入事件',
            sanctumTarget: '',
            sanctumLocation: '',
            sanctumEvent: '',
            sanctumDetail: '',
            characterName: '哲',
            characterAge: '20',
            characterGender: '男',
            characterIdentity: '法厄同一员，录像店店员与幕后绳匠之一',
            characterAbility: '情报分析、远程统筹、冷静判断',
            characterSummary: '正在处理日常事务，同时留意新的委托与街区动向',
            outgoingDialogue: '我这边收到一点新情况，你要现在过来看看吗？'
          };
        }

        if (protagonist === '铃') {
          return {
            protagonist: '铃',
            mode: '剧情模式',
            chapter: '生意×怪事×正义',
            storyStartPoint: '刚结束一段忙碌后的空档',
            storyLocation: '录像店二楼',
            storyExtra: '希望从铃更活泼自然的视角切入，带一点日常聊天感',
            sanctumTarget: '',
            sanctumLocation: '',
            sanctumEvent: '',
            sanctumDetail: '',
            characterName: '铃',
            characterAge: '19',
            characterGender: '女',
            characterIdentity: '法厄同一员，录像店店员与幕后绳匠之一',
            characterAbility: '快速应变、联络统筹、社交直觉',
            characterSummary: '正一边整理店内事务，一边和熟人联络，准备处理新的状况',
            outgoingDialogue: '你现在有空吗？我这边好像遇到点有意思的事。'
          };
        }

        return {
          protagonist: '原创主角',
          mode: '剧情模式',
          chapter: '生意×怪事×正义',
          storyStartPoint: '刚接触这座城市不久的阶段',
          storyLocation: '六分街附近',
          storyExtra: '希望原创主角以较强的陌生感切入，对新艾利都保持警惕和好奇',
          sanctumTarget: '',
          sanctumLocation: '',
          sanctumEvent: '',
          sanctumDetail: '',
          characterName: '{{user}}',
          characterAge: '20',
          characterGender: '男',
          characterIdentity: '初到新艾利都并试图站稳脚跟的外来者',
          characterAbility: '观察力、记忆力、局势判断',
          characterSummary: '黑发，习惯独自行走街区边缘，擅长收集消息与观察局势变化，刚刚进入更复杂的街区关系网，对录像店、委托与空洞世界保持谨慎探索',
          outgoingDialogue: '我已经到附近了，不过这里的情况比我想的复杂。'
        };
      }

      function getFormData() {
        return {
          protagonist: $('input[name="protagonist"]:checked').val() || '',
          mode: $('.mode-btn.active').data('mode') || '剧情模式',

          chapter: $('#chapter-select').val(),
          storyStartPoint: $('#story-start-point').val(),
          storyLocation: $('#story-location').val(),
          storyExtra: $('#story-extra').val(),

          sanctumTarget: $('#sanctum-target').val(),
          sanctumLocation: $('#sanctum-location').val(),
          sanctumEvent: $('#sanctum-event').val(),
          sanctumDetail: $('#sanctum-detail').val(),

          characterName: $('#character-name').val(),
          characterAge: $('#character-age').val(),
          characterGender: $('#character-gender').val(),
          characterIdentity: $('#character-identity').val(),
          characterAbility: $('#character-ability').val(),
          characterSummary: $('#character-summary').val(),
          outgoingDialogue: $('#outgoing-dialogue').val()
        };
      }

      function saveData() {
        localStorage.setItem(storageKey, JSON.stringify(getFormData()));
      }

      function applyDataToForm(data, preserveSelectedRole = false) {
        if (!data) return;

        if (!preserveSelectedRole && data.protagonist) {
          $('.char-option').removeClass('selected').find('input[type="radio"]').prop('checked', false);
          $(`.char-option[data-protagonist="${data.protagonist}"]`)
            .addClass('selected')
            .find('input[type="radio"]').prop('checked', true);
        }

        $('#chapter-select').val(data.chapter || '生意×怪事×正义');
        $('#story-start-point').val(data.storyStartPoint || '');
        $('#story-location').val(data.storyLocation || '');
        $('#story-extra').val(data.storyExtra || '');

        $('#sanctum-target').val(data.sanctumTarget || '');
        $('#sanctum-location').val(data.sanctumLocation || '');
        $('#sanctum-event').val(data.sanctumEvent || '');
        $('#sanctum-detail').val(data.sanctumDetail || '');

        $('#character-name').val(data.characterName || '');
        $('#character-age').val(data.characterAge || '');
        $('#character-gender').val(data.characterGender || '');
        $('#character-identity').val(data.characterIdentity || '');
        $('#character-ability').val(data.characterAbility || '');
        $('#character-summary').val(data.characterSummary || '');
        $('#outgoing-dialogue').val(data.outgoingDialogue || '');

        if (data.mode) {
          $('.mode-btn').removeClass('active');
          $(`.mode-btn[data-mode="${data.mode}"]`).addClass('active');
        }

        applyReadonlyByRole(data.protagonist || $('input[name="protagonist"]:checked').val() || '');
        refreshModePanels();
      }

      function loadData() {
        const stored = localStorage.getItem(storageKey);
        if (!stored) return;
        try {
          const data = JSON.parse(stored);
          applyDataToForm(data);
        } catch (e) {
          console.warn(e);
        }
      }

      function fillExampleByCurrentRole() {
        const protagonist = $('input[name="protagonist"]:checked').val();
        if (!protagonist) {
          toastr.warning('请选择主角');
          return;
        }
        const example = getExampleData(protagonist);
        applyDataToForm(example, true);
        applyReadonlyByRole(protagonist);
        saveData();
        toastr.success('已填入对应示例');
      }

      updateClock();
      setInterval(updateClock, 60000);

      $('.char-option').on('click', function() {
        $('.char-option').removeClass('selected');
        $(this).addClass('selected');
        $(this).find('input[type="radio"]').prop('checked', true);

        const protagonist = $(this).data('protagonist');
        const example = getExampleData(protagonist);
        applyDataToForm(example, true);
        applyReadonlyByRole(protagonist);
        saveData();
        toastr.success('已自动填入该角色示例');
      });

      $('.mode-btn').on('click', function() {
        $('.mode-btn').removeClass('active');
        $(this).addClass('active');
        refreshModePanels();
        saveData();
      });

      $('#prompt-form input, #prompt-form textarea, #prompt-form select').on('change input', function() {
        saveData();
      });

      $('#fill-example-btn').on('click', function() {
        fillExampleByCurrentRole();
      });

      $('#prompt-form').on('submit', function(e) {
        e.preventDefault();

        const data = getFormData();

        if (!data.protagonist) {
          toastr.warning('请选择主角');
          return;
        }

        if (!data.characterName) {
          toastr.warning('请填写主角名称');
          return;
        }

        if (!data.characterIdentity || !data.characterSummary) {
          toastr.warning('请填写身份设定与角色补充描述');
          return;
        }

        if (data.mode === '剧情模式' && !data.chapter) {
          toastr.warning('剧情模式需要选择章节');
          return;
        }

        if (data.mode === '私人圣所模式' && (!data.sanctumTarget || !data.sanctumEvent)) {
          toastr.warning('私人圣所模式需要填写指定人物与想要进行的事情');
          return;
        }

        let protagonistBlock = [];

        if (data.protagonist === '哲') {
          protagonistBlock = [
            '主角信息',
            '主角类型：官方主角',
            '主角名称：哲',
            '主角性别：男',
            '主角年龄：' + (data.characterAge || '20'),
            '主角身份：' + data.characterIdentity,
            '主角能力：' + (data.characterAbility || '无'),
            '主角补充描述：' + data.characterSummary,
            '主角图片：https://files.catbox.moe/2l4n7n.png'
          ];
        } else if (data.protagonist === '铃') {
          protagonistBlock = [
            '主角信息',
            '主角类型：官方主角',
            '主角名称：铃',
            '主角性别：女',
            '主角年龄：' + (data.characterAge || '19'),
            '主角身份：' + data.characterIdentity,
            '主角能力：' + (data.characterAbility || '无'),
            '主角补充描述：' + data.characterSummary,
            '主角图片：https://files.catbox.moe/n8v5u4.png'
          ];
        } else {
          protagonistBlock = [
            '主角信息',
            '主角类型：原创主角',
            '主角名称：' + data.characterName,
            '主角性别：' + (data.characterGender || '未设定'),
            '主角年龄：' + (data.characterAge || '未设定'),
            '主角身份：' + data.characterIdentity,
            '主角能力：' + (data.characterAbility || '无'),
            '主角补充描述：' + data.characterSummary,
            '主角图片：https://files.catbox.moe/m670zu.jpg'
          ];
        }

        const modeBlock = data.mode === '剧情模式'
          ? [
              '模式：剧情模式',
              '章节名称：' + data.chapter,
              '剧情起始点：' + (data.storyStartPoint || '默认开场'),
              '当前地点：' + (data.storyLocation || '未设定'),
              '补充要求：' + (data.storyExtra || '无')
            ]
          : [
              '模式：私人圣所模式',
              '指定人物：' + data.sanctumTarget,
              '发生地点：' + (data.sanctumLocation || '未设定'),
              '想进行的事情：' + data.sanctumEvent,
              '情境描述：' + (data.sanctumDetail || '无')
            ];

        let finalPrompt =
          '<status>\n' +
          '[系统指令：生成绝区零风格开场]\n' +
          protagonistBlock.join('\n') + '\n\n' +
          modeBlock.join('\n') + '\n\n' +
          '生成要求：\n' +
          '1. 开场采用绝区零式都市感、终端感与日常质感\n' +
          '2. 优先根据主角身份与模式内容组织开局\n' +
          '3. 若主角为哲或铃，则保持其官方角色气质与说话方式\n' +
          '4. 若主角为原创主角，则严格依据已提供的人物信息塑造\n' +
          '5. 若存在发送出去的对话，则将其视为剧情开始前已发出的消息\n' +
          '</status>';

        if (data.outgoingDialogue && data.outgoingDialogue.trim()) {
          finalPrompt += '\n\n已发送的对话：\n' + data.outgoingDialogue.trim();
        }

        const chatInput = getChatInput();
        if (!chatInput) {
          toastr.error('未找到聊天输入框');
          return;
        }

        const oldValue = chatInput.value.trim();
        chatInput.value = oldValue ? oldValue + '\n\n' + finalPrompt : finalPrompt;
        chatInput.dispatchEvent(new Event('input', { bubbles: true }));

        toastr.success('内容已写入对话框，请手动发送');
      });

      toastr.options = {
        closeButton: true,
        positionClass: 'toast-bottom-right',
        timeOut: 2600
      };

      refreshModePanels();
      loadData();

      if (!localStorage.getItem(storageKey)) {
        const defaultData = getExampleData('哲');
        applyDataToForm(defaultData);
        $('.char-option[data-protagonist="哲"]')
          .addClass('selected')
          .find('input[type="radio"]').prop('checked', true);
        applyReadonlyByRole('哲');
        refreshModePanels();
        saveData();
      } else {
        const protagonist = $('input[name="protagonist"]:checked').val() || '哲';
        applyReadonlyByRole(protagonist);
      }
    });
  </script>
