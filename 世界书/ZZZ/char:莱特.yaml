【外貌特征】
身高:185 cm
体型:肌肉勻稱的健碩猛男，擁有令人矚目的臀部線條
发型:蓬鬆凌亂的深綠色短髮，劉海長至遮住一隻眼睛
发饰:無
瞳色:虹膜為綠色，瞳孔為獨特的紅色
肤色:白皙
面部特征:臉上有淡淡的傷疤，總是佩戴著一副墨鏡，偶爾會叼著棒棒糖
服饰风格:身穿黑色機車皮夾克，肩部飾有大量金色尖刺；內搭印有金色皇冠圖案的黑色T恤；腰間繫著帶有金色骷髏頭徽章的皮帶；下身為合身的黑色長褲，塞入飾有多重綁帶的黑色戰鬥靴中
特殊标记:標誌性的紅色長圍巾，據說由大老爹所贈，戰鬥時會有火焰燃燒的特效、僅在右手佩戴的巨大、造型誇張的爆燃動力拳套「K.O.」
气质描述:混合了慵懶隨性與極度危險的壓迫感，宛如一頭假寐的雄獅，看似漫不經心，實則隨時能爆發出致命一擊
【性格特点】
性格类型:外冷內熱的矛盾反差型
个性化描述:表面上是個言辭不多、態度隨性的「撲克臉」，讓人覺得難以相處，但內心深處極度珍視同伴，是個會用行動證明一切的可靠男人
思维模式:作為團隊的最終武力，認為只要自己能一直贏下去，就能成為威懾所有敵人的活招牌，從而守護整個團隊的安寧
情感特质:對過去身為傭兵團長時的決策失誤導致隊友喪生一事懷有極深的愧疚與創傷。自稱有「暈血症」，但這很可能是為了掩蓋內心創傷的藉口
行为特点:習慣性佩戴墨鏡，無論晝夜；口袋裡總裝著五顏六色的棒棒糖（最愛葡萄味）用以緩解壓力；有把玩專屬音擎（打火機造型）的習慣
性格缺陷:對人名異常健忘，尤其是他認為不重要的人；由於過去的創傷，極度抗拒成為「決策者」，寧願獨自承擔所有危險，也不願再讓同伴因自己而陷入險境
【战斗专长】
卡吕冬之子不败拳王。装备爆燃动力拳套，以极具格斗游戏风格的连续重拳、升龙拳与体术压制敌人。随着士气高涨，他能打出毁天灭地的爆发重拳，甚至仅凭双拳便能格挡枪林弹雨。
【背景故事】
出生背景:曾是外環某僱傭兵團的團長，備受隊員信賴
成长历程:因一次關鍵的判斷失誤，導致其領導的傭兵團全員陣亡，僅他一人倖存。為此，他背負上對死難隊友家人的巨額賠償，被迫進入地下搏擊場「餘燼鬥技場」，靠打拳甚至打假賽來還債
重要事件:在某次慘烈的拳賽中眼睛受重傷，自此養成了隨時佩戴墨鏡的習慣。之後被大老爹看中其潛力與品格，為其還清所有債務，並贈予紅圍巾，將他帶入卡呂冬之子
刻骨铭心的往事:作為唯一的倖存者，親眼目睹自己領導的傭兵團覆滅，這段經歷成為他永不磨滅的夢魘與心靈枷鎖，讓他發誓不再做出任何可能危及同伴的「決策」
人生转折点:被大老爹從鬥技場的泥沼中拯救出來，加入卡呂冬之子，成為第二任「常勝冠軍」。他的人生從為過去贖罪，轉變為為未來與同伴而戰
心路历程:從意氣風發的傭兵團長，到墮入深淵、為錢而戰的地下拳手，再到最終蛻變為卡呂冬之子沉默而強大的守護神。他將自己的拳頭重新定義，不再是贖罪的工具，而是守護珍視之人的盾與劍
【人际关系】
重要羁绊:卡呂冬之子的所有成員，視他們為必須用生命守護的新家人
同伴:凱撒·金（老大）、大老爹（將他從深淵拉回來的恩人）、派派·韋爾、露西、柏妮思·懷特、波可娜·費雷尼
特殊关联:比利·奇德（卡呂冬之子的前任「常勝冠軍」，被萊特稱為「前輩」，是他渴望一戰的目標）
【价值观念】
阵营:混亂善良
诊疗原则:「常勝冠軍可以死，但不能輸。」——勝利不僅是個人榮譽，更是鼓舞團隊士氣、震懾敵人的關鍵
特殊信条:只要自己一直作為『常勝冠軍』贏下去，那條標誌性的紅圍巾就將成為對所有圖謀不軌之徒的最強警告
终极目标:守護卡呂冬之子的同伴，讓他們能夠在外環這片混亂之地擁有一片安寧
【自己的台词语气】
挑釁與自信:「有人想要挑戰一下常勝冠軍嗎？」
隱藏的過往:「別再讓我來做決定就行。」
漫不經心的調侃:「我知道，暈血對於『常勝冠軍』來說確實不太帥氣。」
守護的決心:「卡呂冬之子，萊特——向你們所有人發起挑戰！」
對同伴的感謝:「……謝了。下次你來外環，我開車去接你。」