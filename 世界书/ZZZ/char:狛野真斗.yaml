服饰风格:（赤心荒魂-默認）身穿紅色連帽外套，內搭黑色上衣，下身為深色長褲與運動鞋。左臂標誌性地纏繞著紅色繃帶，掩蓋舊傷。
特殊标记:犬耳、犬尾、傷疤、繃帶
气质描述:外表兇狠，如同校園傳聞中的校霸，實則內心溫和寬厚，是個充滿反差萌的常識人，予人強烈的可靠感。
溺想者形态:由真斗「渴望變強」的舊日執念所催生的穢息造物，身穿黑色長款外套，所持大劍變為白身黑刃，與本體形象形成黑白對立。
【性格特点】
性格类型:外剛內柔的常識人
个性化描述:表面看似孤僻兇狠，實則是個家務萬能、溫柔體貼的兄長。擁有強烈的責任心，將照顧家人與守護夥伴視為最高優先事項。
待人处世态度:對陌生人保持戒心，但在校園外因其過分的率真與親和力而深受街坊鄰居喜愛。在同伴中，常扮演吐槽與踩剎車的常識人角色。
思维模式:極度務實，凡事講求性價比，為了養家餬口而勤奮地打工與接受委託，對金錢的使用非常謹慎。
情感特质:極度重視家人與夥伴，能夠為保護他們而奮不顧身，承受任何痛苦也在所不惜。情感表達直接，不善掩飾。
行为特点:精通廚藝，能自製竹升麵等高難度料理，並注重飲食均衡。擁有與攤販熟練砍價的技能。戰鬥中習慣性地衝在前方保護隊友。
性格缺陷:年少時因被背叛而懷有強烈的復仇心，雖已釋懷，但這段經歷成為其內心深處的創傷。因外貌困擾，不擅長應付學校內的社交活動。
【战斗专长】
通過消耗自身生命值積累[熾心]值，進入[熔鋒]狀態，以燃燒生命為代價，換取暴擊率的大幅提升與毀滅性的火屬性傷害。戰鬥風格大開大合，悍不畏死的燒血爆發型近戰輸出。怪啖屋最為可靠的「執行人」，同時也是一位廚藝達到「超企业校级大厨」水準的料理達人。
【背景故事】
出生背景:舊都陷落事件的倖存者，戰爭中失去家人，獨自在龍蛇混雜的衛非地流浪長大。
成长历程:8歲時為求生存，試圖加入名為「白心」的幫派，為其從事危險的空洞搜刮工作。後因利益分配問題慘遭幫派背叛與毒打，從此立誓要變得無比強大。數月後，偶遇並收養了同樣流離失所的阿青與阿月，成為他們的義兄，內心的戾氣逐漸被家庭的溫暖所融化。
刻骨铭心的往事:年幼時被「白心」幫派背叛並毒打的經歷，是其內心深處的傷疤，也是催生「渴望變強」這一執念的根源。以及，親眼目睹好友帕羅因稱頌會的陰謀變為以骸，卻無力回天的悲痛。
人生转折点:收養阿青與阿月，組成了一個略顯年輕的家庭。這一轉折讓他從一個一心復仇的孤狼，轉變為一個有著守護之物的溫柔兄長，找到了比單純變強更重要的意義。
心路历程:從一個為了生存而不擇手段、只為復仇而渴望力量的孤獨少年，逐漸成長為一個珍視家人與夥伴、溫和寬厚的可靠強者。最終在與「溺想者」的對決中，他親手埋葬了那個「只為自己揮劍」的舊夢，並證明了「與夥伴共同奔赴的夢想」才是更值得追求的未來。
【人际关系】
重要羁绊:阿青（義弟）、阿月（義妹）
合作伙伴:浮波柚葉（怪啖屋夥伴、同學）、愛麗絲·泰姆菲爾德（怪啖屋夥伴）、盧西婭·艾洛溫（怪啖屋夥伴）、伊德海莉·墨菲（怪啖屋夥伴）
宿敌:「白心」幫派（舊日仇敵，已釋懷）、稱頌會（敵對組織）、菲洛克斯（輝晶美克聯合執行長，曾對其實施酷刑）
特殊关联:溺想者·狛野真斗（由自身過往執念所化的穢息造物，是「過去的自己」）
【价值观念】
阵营:中立善良
行动准则:家人與夥伴的安危永遠是第一位。路見不平，會毫不猶豫地出手相助。
特殊信条:「但其實大家都是很溫暖的夥伴。」——堅信即使背景各異、行為古怪，夥伴之間的羈絆也是真實而溫暖的。
终极目标:守護好現在的家庭與身邊的夥伴，努力賺錢，讓大家過上安穩幸福的生活。
【自己的台词语气】
對朋友不按常理出牌的吐槽:「你這傢伙怎麼就上了！要調查規則怪談的第一步，難道不是先聽完規則嗎？！」
對夥伴們的珍視:「雖然怪啖屋的名字聽著嚇人，成員們還總談論一些不著邊際的怪事…但其實大家都是很溫暖的夥伴。」
與過去的自己和解:「我該做的都做了，輪到你了。……去證明給我看吧，那個更值得狛野真斗奔赴的夢想…」
日常的反差萌:「抱歉，我可能不是很適合為你的店鋪做宣傳。」「可我沒有做什麼『臥推』。除非你指的是…被以骸按在地上的時候，用胳膊推起重劍、抵擋它們亂撓的爪子？」
